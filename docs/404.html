<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена | Guides</title>
  <style>
    :root {
      --color-bg: #0f0f13;
      --color-surface: #1a1a24;
      --color-text: #e2e2e8;
      --color-muted: #8888a0;
      --color-accent: #ff6b35;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      text-align: center;
    }
    .error-page { max-width: 480px; }
    .error-page__code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
    }
    .error-page__title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .error-page__text {
      color: var(--color-muted);
      margin-top: 1rem;
      line-height: 1.6;
    }
    .error-page__link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      color: var(--color-bg);
      background-color: var(--color-accent);
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .error-page__link:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Страница не найдена</h1>
    <p class="error-page__text">
      Такой страницы не существует. Возможно, ссылка устарела или вы ошиблись в адресе.
    </p>
    <a class="error-page__link" href="./">Вернуться на главную</a>
  </div>
</body>
</html>
